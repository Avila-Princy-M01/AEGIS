# ── AEGIS: Autonomous Wallet Guardian — Uniswap Track ──────────────
# Classified Hackathon submission targeting $25K Uniswap + $12K Lido + $15K Base Tracks.
# Multi-agent system: Guard + Grow + Rebalance + MEV + Legacy protecting LP positions.
# Real on-chain Uniswap V3 integration via web3.py. Monitors wstETH/ETH (Lido).
# ENS name resolution for beneficiaries. Lido yield comparison. Cross-pool allocation.

[agent]
name = "aegis-guardian"
description = "AEGIS — 5 AI agents protecting Uniswap V3 LP positions: Guard, Grow, Rebalance, MEV Shield, Legacy. Real on-chain data via web3.py. Lido yield comparison, cross-pool allocation, backtesting, ENS resolution. 4 PyVax smart contracts. Ethereum + Base."
workspace_dir = "./workspace"
max_steps = 100

[llm]
provider = "openai"
model = "llama-3.3-70b-versatile"
api_key_env = "GROQ_API_KEY"
base_url = "https://api.groq.com/openai/v1"

[chain]
default = "ethereum"
supported = ["ethereum", "base"]
alchemy_api_key_env = "ALCHEMY_API_KEY"

[uniswap]
api_key_env = "UNISWAP_API_KEY"
trading_api_url = "https://trade-api.gateway.uniswap.org/v1"

[chain.ethereum]
rpc_public = "https://eth.llamarpc.com"
default_pool = "0x8ad599c3A0ff1De082011EFDDc58f1908eb6e6D8"  # ETH/USDC 0.3%
pool_label = "ETH/USDC 0.3%"

[chain.base]
rpc_public = "https://mainnet.base.org"
default_pool = "0xd0b53D9277642d899DF5C87A3966A349A798F224"  # ETH/USDC 0.05%
pool_label = "ETH/USDC 0.05%"

[wallet]
backend = "local"
default_chain = "ethereum"

[wallet.policy]
max_native_per_tx = "0.5"
max_native_per_day = "2.0"
allowed_contracts = []
allowed_methods = []

[synthesis]
enabled = true
skill_url = "https://synthesis.md/skill.md"
track = "uniswap,open"
agent_profile = "AEGIS — 5 AI agents for Uniswap V3 LP management: Guard/Grow/Rebalance/MEV/Legacy. Live on-chain monitoring, IL calculation, fee compounding, MEV detection, ENS inheritance. Lido yield analysis, cross-pool allocation, backtesting. 4 PyVax contracts."

[logging]
level = "INFO"
log_dir = "./logs"
